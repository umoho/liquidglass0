# liquidglass0 运行时配置
#
# 修改此文件后重新运行 demo 即可生效，无需重新编译。
# 缺失字段自动使用默认值。

# 玻璃面板形状
[panel]
half_size = [200.0, 150.0]
corner_radius = 28.0
bevel_width = 0.25
bevel_depth = 55.0
reference_size = 200.0

# 光学参数
[optical]
refractive_index = 1.3
chromatic_strength = 0.03
fresnel_intensity = 5.0
specular_intensity = 0.15
specular_shininess = 150.0
blur_radius = 20.0

# 材质参数
[material]
tint_opacity = 0.08
background_opacity = 0.92
saturation = 1.4
contrast = 1.04
brightness = 0.08

# 光源（最多 3 个）
[[lights]]
position_factor = [0.2, 0.15]
color = [1.0, 1.0, 1.0]
intensity = 0.9

[[lights]]
position_factor = [0.85, 0.25]
color = [0.95, 0.97, 1.0]
intensity = 0.5

[[lights]]
position_factor = [0.75, 0.8]
color = [1.0, 0.98, 0.95]
intensity = 0.3
